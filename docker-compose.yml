version: '3.8'

services:
  rabbit-mq:
    image: rabbitmq:3-management
    container_name: rabbit-mq
    ports:
      - "5672:5672"       # RabbitMQ messaging
      - "5001:15672"      # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - store-app-network

  centralstore-db-server:
    image: mcr.microsoft.com/mssql/server:2019-CU32-GDR2-ubuntu-20.04
    container_name: centralstore-db-server
    ports:
      - "4001:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=P@ssw0rd123
      - MSSQL_PID=Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P P@ssw0rd123 -C -Q \"SELECT 1\" -b -o dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - store-app-network

  localstore1-db-server:
    image: mcr.microsoft.com/mssql/server:2019-CU32-GDR2-ubuntu-20.04
    container_name: localstore1-db-server
    ports:
      - "4002:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=P@ssw0rd123
      - MSSQL_PID=Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P P@ssw0rd123 -C -Q \"SELECT 1\" -b -o dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - store-app-network
  
  # For testing purposes if additional Local stores are required for a more extended testing - 2nd Local store db server

  # localstore2-db-server:
  #   image: mcr.microsoft.com/mssql/server:2019-CU32-GDR2-ubuntu-20.04
